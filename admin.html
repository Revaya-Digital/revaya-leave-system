async function addHoliday(){

const name = document.getElementById("holidayName").value
const date = document.getElementById("holidayDate").value

if(!name || !date){
alert("Enter holiday name and date")
return
}

if(editingHolidayId){

const { error } = await db
.from("holidays")
.update({
name:name,
holiday_date:date
})
.eq("id",editingHolidayId)

if(error){
alert(error.message)
return
}

editingHolidayId = null
document.querySelector("#holidaysPage button").innerText = "Add Holiday"

}
else{

const { error } = await db
.from("holidays")
.insert({
name:name,
holiday_date:date
})

if(error){
alert(error.message)
return
}

}

document.getElementById("holidayName").value=""
document.getElementById("holidayDate").value=""

loadHolidays()

}

function editHoliday(id,name,date){

editingHolidayId = id;

document.getElementById("holidayName").value = name;
document.getElementById("holidayDate").value = date;

document.querySelector("#holidaysPage button").innerText = "Update Holiday";

}

async function deleteHoliday(id){

if(!confirm("Delete this holiday?")) return

await db
.from("holidays")
.delete()
.eq("id",id)

loadHolidays()

}

async function adminApplyLeave(){

const emp = document.getElementById("empSelect").value;
const type = document.getElementById("leaveType").value;
const start = document.getElementById("startDate").value;
const end = document.getElementById("endDate").value;

if(!emp || !type || !start || !end){
alert("Please fill all fields");
return;
}

const startDate = new Date(start);
const endDate = new Date(end);

const diffTime = Math.abs(endDate - startDate);
const days = Math.floor(diffTime / (1000 * 60 * 60 * 24)) + 1;

const { error } = await db
.from("leave_requests")
.insert({
employee_id: emp,
type_id: type,
start_date: start,
end_date: end,
days: days,
status: "approved",
is_pto: true
});

if(error){
showToast(error.message,"error");
return;
}

showToast("Leave approved & email sent","success");

renderRequestsPage();

}

async function loadTodayLeaves(){

const today = new Date().toISOString().split("T")[0]

const { data: leaves } = await db
.from("leave_requests")
.select("*")
.eq("status","approved")

const { data: employees } = await db
.from("employees")
.select("auth_user_id,name")

const { data: types } = await db
.from("leave_types")
.select("id,name")

const typeMap={}
types.forEach(t=>typeMap[t.id]=t.name)

const empMap={}
employees.forEach(e=>empMap[e.auth_user_id]=e.name)

const body = document.querySelector("#todayLeaveTable tbody")

body.innerHTML=""

leaves.forEach(l=>{

if(today>=l.start_date && today<=l.end_date){

body.innerHTML+=`
<tr>
<td>${empMap[l.employee_id]}</td>
<td>${typeMap[l.type_id]}</td>
<td>Approved</td>
</tr>
`

}

})

}

async function loadTeamCalendar(){

const { data: leaves } = await db
.from("leave_requests")
.select("*")
.eq("status","approved")

const { data: employees } = await db
.from("employees")
.select("auth_user_id,name")

const today = new Date()

let days=[]

for(let i=0;i<7;i++){

let d = new Date()
d.setDate(today.getDate()+i)

days.push(d.toISOString().split("T")[0])

}

const container=document.getElementById("teamCalendar")

container.innerHTML=""

let html=`<div class="calendar-grid">`

html+=`<div></div>`

days.forEach(d=>{
html+=`<div class="calendar-header">${d.slice(5)}</div>`
})

employees.forEach(emp=>{

html+=`<div class="calendar-name">${emp.name}</div>`

days.forEach(day=>{

let onLeave=false

leaves.forEach(l=>{

if(
l.employee_id===emp.auth_user_id &&
day>=l.start_date &&
day<=l.end_date
){
onLeave=true
}

})

html+=`
<div class="calendar-day ${onLeave?"calendar-leave":""}">
${onLeave?"L":""}
</div>
`

})

})

html+=`</div>`

container.innerHTML=html

}

async function loadRequests(){

const selectedStatus = document.getElementById("statusFilter").value;
const selectedEmployee = document.getElementById("employeeFilter").value;
const fromDate = document.getElementById("fromDate").value;
const toDate = document.getElementById("toDate").value;
const selectedType = document.getElementById("typeFilter").value;
const ptoFilter = document.getElementById("ptoFilter").value;

let query = db
.from("leave_requests")
.select("*")
.order("created_at",{ascending:false});

if(selectedStatus !== "all"){
query = query.eq("status",selectedStatus);
}

if(selectedEmployee !== "all"){
query = query.eq("employee_id",selectedEmployee);
}

if(fromDate){
query = query.gte("start_date",fromDate);
}

if(toDate){
query = query.lte("end_date",toDate);
}

if(selectedType !== "all"){
query = query.eq("type_id",selectedType);
}

if(ptoFilter === "paid"){
query = query.eq("is_pto",true);
}

if(ptoFilter === "unpaid"){
query = query.eq("is_pto",false);
}

const { data: requests } = await query;

const { data: approvedLeaves } = await db
.from("leave_requests")
.select("employee_id,type_id,days,start_date")
.eq("status","approved");

const { data: employees } = await db
.from("employees")
.select("auth_user_id,name");

const { data: types } = await db
.from("leave_types")
.select("id,name,yearly_quota");

const empMap = {};
employees.forEach(e => empMap[e.auth_user_id] = e.name);

const typeMap = {};
types.forEach(t => typeMap[t.id] = t.name);

const usedMap = {};
approvedLeaves.forEach(l=>{
const year = new Date(l.start_date).getFullYear();
const key = l.employee_id+"*"+l.type_id+"*"+year;

if(!usedMap[key]) usedMap[key]=0;
usedMap[key]+=l.days;
});

const quotaMap = {};
types.forEach(t=>{
quotaMap[t.id] = t.yearly_quota;
});

const body = document.querySelector("#reqTable tbody");
body.innerHTML="";

requests.forEach(r=>{

const year = new Date(r.start_date).getFullYear();
const key = r.employee_id+"*"+r.type_id+"*"+year;

const used = usedMap[key] || 0;
const quota = quotaMap[r.type_id] || 0;
const remaining = quota - used;

/* balance badge */
let badgeClass = "badge-good";

if(remaining < (quota * 0.25)) badgeClass = "badge-pending";
if(remaining <= 0) badgeClass = "badge-bad";
if(remaining < 0) badgeClass = "badge-bad";

let balanceBadge = `<span class="badge ${badgeClass}">${remaining}</span>`;

const actionButtons =
r.status === "pending"
? `<button onclick="approve('${r.id}')">Approve</button>        <button onclick="reject('${r.id}')">Reject</button>`
: r.status === "approved"
? `<button onclick="adminCancel('${r.id}')">Cancel</button>`
: `<span>-</span>`;

body.innerHTML+=`

<tr>
<td>${empMap[r.employee_id] || "Unknown"}</td>
<td>${typeMap[r.type_id]}</td>
<td>
${r.status === "pending"
  ? `
    <label>
      <input type="radio" name="pto_${r.id}" value="true" ${r.is_pto ? "checked" : ""}> Paid
    </label>
    <label>
      <input type="radio" name="pto_${r.id}" value="false" ${!r.is_pto ? "checked" : ""}> Unpaid
    </label>
  `
  : `
    <span class="badge ${r.is_pto ? "badge-good" : "badge-bad"}">
      ${r.is_pto ? "Paid" : "Unpaid"}
    </span>
  `
}
</td>
<td>${r.start_date}</td>
<td>${r.end_date}</td>
<td>${r.days}</td>
<td>${r.is_half_day? `Half Day (${r.half_day_session})`: `${r.days} Day(s)`}</td>
<td>${r.admin_comment || "-"}</td>
<td>${balanceBadge}</td>
<td>
  <span class="center badge ${r.status === "approved" ? "badge-good": r.status === "pending" ? "badge-pending": r.status === "cancel_requested" ? "badge-pending": "badge-bad"}">
    ${r.status.charAt(0).toUpperCase() + r.status.slice(1)}
  </span>
</td>
<td>
  <textarea id="c_${r.id}" placeholder="Write new comment..."></textarea>
  <br>
  ${actionButtons}
</td>
</tr>`;
});
}

async function approve(id){

const { data: leave } = await db
.from("leave_requests")
.select("*")
.eq("id",id)
.single();

const { data: emp } = await db
.from("employees")
.select("email,name,phone")
.eq("auth_user_id",leave.employee_id)
.single();

const commentBox = document.getElementById("c_"+id);
const ptoSelect = document.querySelector(`input[name="pto_${id}"]:checked`);

const { data: old } = await db
.from("leave_requests")
.select("is_pto, admin_comment")
.eq("id",id)
.single();

const oldPTO = old.is_pto === true;
const newPTO = ptoSelect && ptoSelect.value === "true";

let finalComment = old.admin_comment || "";
const newComment = commentBox.value || "";

if(newComment){
finalComment += (finalComment ? " | " : "") + newComment;
}

if(oldPTO !== newPTO){
finalComment += (finalComment ? " | " : "") + "PTO changed by admin";
}

const { error } = await db.from("leave_requests")
.update({
status:"approved",
is_pto:newPTO,
admin_comment:finalComment
})
.eq("id",id);

/* 🔔 EMAIL TRIGGER */
try{
const res = await fetch("https://shecktyeqaqojhotysff.functions.supabase.co/send-email",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + SUPABASE_ANON_KEY,
"apikey": SUPABASE_ANON_KEY
},
body: JSON.stringify({
to: emp.email,
subject: "Leave Approved",
message: `Hi ${emp.name}, your leave from ${leave.start_date} to ${leave.end_date} has been approved.`
})
});
}catch(e){
showToast("System Error. Admin not Notified","error");
}

/* 📱 WHATSAPP TRIGGER */
try{
const wa = await fetch("https://shecktyeqaqojhotysff.functions.supabase.co/send-whatsapp",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + SUPABASE_ANON_KEY,
"apikey": SUPABASE_ANON_KEY
},
body: JSON.stringify({
phone: emp.phone,
message: `Leave Approved
From: ${leave.start_date}
To: ${leave.end_date}`
})
});
}catch(e){
showToast("System Error. Admin not Notified","error");
}

if(error){
showToast(error.message,"error");
return;
}

showToast("Leave approved & email sent","success");
