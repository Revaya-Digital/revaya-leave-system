function filterTable(inputId, tableId){
  const input = document.getElementById(inputId).value.toLowerCase();
  const rows = document.querySelectorAll(`#${tableId} tbody tr`);
  rows.forEach(row=>{
    const text = row.innerText.toLowerCase();
    row.style.display = text.includes(input) ? "" : "none";
  });
}

async function loadEmployeeFilter(selectid){
  const empId = await getEmployeeId();
  const { data:employees } = await db
  .from("employees")
  .select("id,name")

  .order("name");

  const dropdown = document.getElementById(selectid);

  employees.forEach(emp=>{
    dropdown.innerHTML += `<option value="${emp.id}">${emp.name}</option>`;
  });
}

async function loadTeamTasks(){
  const selectedStatus = document.getElementById("taskStatusFilter").value;
  const selectedEmployee = document.getElementById("taskEmployeeFilter").value;
  const selectedProject = document.getElementById("taskProjectFilter").value;
  const selectedDeadlineFrom = document.getElementById("taskFromDeadlineFilter").value;
  const selectedDeadlineTo = document.getElementById("taskToDeadlineFilter").value;

  let query = db
  .from("tasks")
  .select(`
    *,
    projects!tasks_project_id_fkey(name),
    assignee:employees!tasks_assigned_to_fkey(name),
    assigner:employees!tasks_assigned_by_fkey(name)
  `)
  .order("created_at",{ascending:false});

  if(selectedStatus !== "all"){
  query = query.eq("status",selectedStatus);
  }

  if(selectedEmployee !== "all"){
  query = query.eq("assigned_to",selectedEmployee);
  }

  if(selectedProject !== "all"){
  query = query.eq("project_id",selectedProject);
  }

  if(selectedDeadlineFrom){
  query = query.gte("deadline",selectedDeadlineFrom);
  }

  if(selectedDeadlineTo){
  query = query.lte("deadline",selectedDeadlineTo);
  }

  const { data: tasks, error } = await query;

  if(error){
    showToast(error.message,"error");
    return;
  }

  let rows = "";

  tasks.forEach(t=>{
    rows+=`
      <tr>
        <td>${t.title}</td>
        <td>
          ${t.projects?.name || "-"}
        </td>
        <td>
          ${t.assignee?.name || "-"}
        </td>
        <td>
          ${t.assigner?.name || "-"}
        </td>
        <td>
          <span class="badge ${t.status === "closed" || t.status === "submitted" ? "badge-good" : t.status === "in_progress" ? "badge-pending" : "badge-bad"}">
            ${t.status}
          </span>
        </td>
        <td>
          ${t.allotted_hours || 0} hrs
        </td>
        <td>
          ${t.deadline || "-"}
        </td>
        <td style="display:flex;gap:8px;flex-wrap:wrap;">
          <button onclick="openEmployeeEditTaskModal('${t.id}')">
            Edit
          </button>
          <button class="danger-btn" onclick="deleteEmployeeTask('${t.id}',this)">
            Delete
          </button>
        </td>
      </tr>
    `;
  });

  document.getElementById("teamTaskTable").innerHTML = rows;
}


async function deleteEmployeeTask(taskId,btn){
  const confirmDelete = confirm("Are you sure you want to permanently delete this task?");

  if(!confirmDelete){
    return;
  }

  btn.disabled = true;
  showLoader("Deleting Task...");

  try{
    const currentEmpId = await getEmployeeId();

    const { data: task, error: taskError } = await db
    .from("tasks")
    .select("id,assigned_by")
    .eq("id",taskId)
    .single();

    if(taskError){
      throw new Error(taskError.message);
    }

    const { data: subordinates, error: subordinateError } = await db
    .from("employees")
    .select("id")
    .or(`manager_id.eq.${currentEmpId},id.eq.${currentEmpId}`);

    if(subordinateError){
      throw new Error(subordinateError.message);
    }

    const subordinateIds = (subordinates || []).map(e=>e.id);
    const isOwnTask = task.assigned_by === currentEmpId;
    const isSubordinateTask = subordinateIds.includes(task.assigned_by);

    if(!isOwnTask && !isSubordinateTask){
      throw new Error("You are not authorized to delete this task");
    }

    const { data: taskLogs, error: logError } = await db
    .from("task_logs")
    .select("id")
    .eq("task_id",taskId)
    .limit(1);

    if(logError){
      throw new Error(logError.message);
    }

    if(taskLogs && taskLogs.length > 0){
      throw new Error("Task cannot be deleted because work logs exist");
    }

    const { error: deleteError } = await db
    .from("tasks")
    .delete()
    .eq("id",taskId);

    if(deleteError){
      throw new Error(deleteError.message);
    }

    hideLoader();
    showToast("Task deleted successfully", "success");
    loadTeamTasks();

  }
  catch(err){
    hideLoader();
    btn.disabled = false;
    showToast(err.message,"error");
  }
}

async function updateEmployeeTask(taskId,btn){
  btn.disabled = true;
  showLoader("Updating Task...");

  try{
    const currentEmpId = await getEmployeeId();
    const { data: task, error: taskError } = await db
    .from("tasks")
    .select("*")
    .eq("id",taskId)
    .single();

    if(taskError){
      throw new Error(taskError.message);
    }

    const { data: subordinates, error: subordinateError } = await db
    .from("employees")
    .select("id")
    .or(`manager_id.eq.${currentEmpId},id.eq.${currentEmpId}`);

    if(subordinateError){
      throw new Error(subordinateError.message);
    }

    const subordinateIds = (subordinates || []).map(e=>e.id);
    const isOwnTask = task.assigned_by === currentEmpId;
    const isSubordinateTask = subordinateIds.includes(task.assigned_by);

    if(!isOwnTask && !isSubordinateTask){
      throw new Error("You are not authorized to edit this task");
    }

    const payload = {
      assigned_to:document.getElementById("employeeEditTaskAssign").value,
      allotted_hours:Number(document.getElementById("employeeEditTaskHours").value),
      deadline:document.getElementById("employeeEditTaskDeadline").value,
      status:document.getElementById("employeeEditTaskStatus").value,
      description:document.getElementById("employeeEditTaskDesc").value
    };

    const { error: updateError } = await db
    .from("tasks")
    .update(payload)
    .eq("id",taskId);

    if(updateError){
      throw new Error(updateError.message);
    }

    hideLoader();
    showToast("Task updated successfully", "success");
    btn.closest(".modal").remove();
    loadTeamTasks();

  }
  catch(err){
    hideLoader();
    btn.disabled = false;
    showToast(err.message,"error");
  }
}

async function loadManagerTeamLeaves() {

  const empId = await getEmployeeId();

  const { data, error } = await db
    .from("leave_requests")
    .select(`
      *,
      employees!leave_requests_employee_id_fkey(name)
    `)
    .neq("employee_id", empId)
    .eq("status","approved")
    .order("start_date", { ascending: true });

  if(error){
    showToast(error.message,"error");
    return;
  }

  renderManagerCalendar(data);
}

function renderManagerCalendar(leaves){

  if(!leaves) return;

  // 🔴 next 7 days
  const today = new Date();
  let days = [];

  for(let i=0;i<7;i++){
    let d = new Date();
    d.setDate(today.getDate()+i);
    days.push(d.toISOString().split("T")[0]);
  }

  const container = document.getElementById("managerCalendar");
  container.innerHTML = "";

  let html = `<div class="calendar-grid">`;

  // header
  html += `<div></div>`;
  days.forEach(d=>{
    html += `<div class="calendar-header">${d.slice(5)}</div>`;
  });

  // 🔴 group by employee
  const grouped = {};

  leaves.forEach(l=>{
    const name = l.employees?.name || "Unknown";

    if(!grouped[name]) grouped[name] = [];
    grouped[name].push(l);
  });

  // 🔴 rows
  Object.keys(grouped).forEach(name=>{

    html += `<div class="calendar-name">${name}</div>`;

    days.forEach(day=>{

      let onLeave = false;

      grouped[name].forEach(l=>{
        if(day >= l.start_date && day <= l.end_date){
          onLeave = true;
        }
      });

      html += `
        <div class="calendar-day ${onLeave ? "calendar-leave" : ""}">
          ${onLeave ? "L" : ""}
        </div>
      `;
    });

  });

  html += `</div>`;

  container.innerHTML = html;
}

async function loadMyTasks(){
  const empId = await getEmployeeId();
  const { data, error } = await db
  .from("tasks")
  .select(`
    *,
    projects(name),
    task_logs(duration,end_time)
  `)
  .eq("assigned_to", empId)
  .order("created_at",{ascending:false});

  if(error){
    showToast(error.message,"error");
    return;
  }

  let rows = "";

  data.forEach(t=>{
    let totalMinutes = 0;
    if(t.task_logs){
      t.task_logs.forEach(log=>{
        totalMinutes += log.duration || 0;
      });
    }

    const hours = Math.floor(totalMinutes / 3600);
    const mins = Math.floor((totalMinutes % 3600) / 60);
    const secs = totalMinutes % 60;
    const tracked = `${hours}h ${mins}m ${secs}s`;
    rows += `
      <tr>
        <td>${t.title}</td>
        <td>${t.projects?.name || "-"}</td>
        <td>
          <span class="badge ${
            t.status === "completed"
            ? "badge-good"
            : t.status === "in_progress"
            ? "badge-pending"
            : "badge-bad"
          }">
            ${t.status}
          </span>
        </td>
        <td>${t.deadline || "-"}</td>
        <td>${t.allotted_hours || 0}h</td>
        <td>${tracked}</td>
        <td>
          ${
            t.status === "pending"
            ? `
              <button onclick="startTask('${t.id}')">
                Start
              </button>
            `
            : ""
          }
          ${
            t.status === "in_progress"
            ? `
              <button class="danger-btn" onclick="stopTask('${t.id}')">
                Stop
              </button>
            `
            : ""
          }
          ${
            t.status !== "submitted"
            ? `
              <button class="success-btn"
                onclick="completeTask('${t.id}')">
                Complete
              </button>
            `
            : ""
          }
        </td>
      </tr>
    `;
  });
  document.getElementById("taskTable").innerHTML = rows;
}

async function startTask(taskId){
  const empId = await getEmployeeId();
  const { data:active } = await db
  .from("task_logs")
  .select("id")
  .eq("employee_id", empId)
  .is("end_time", null);

  if(active && active.length > 0){
    showToast("Finish active task first","error");
    return;
  }

  await db.from("task_logs").insert({
    task_id: taskId,
    employee_id: empId,
    start_time: new Date().toISOString()
  });

  await db.from("tasks")
  .update({
    status:"in_progress"
  })
  .eq("id", taskId);

  showToast("Task started","success");
  loadMyTasks();
}

async function stopTask(taskId){
  const empId = await getEmployeeId();
  const { data:log } = await db
  .from("task_logs")
  .select("*")
  .eq("task_id", taskId)
  .eq("employee_id", empId)
  .is("end_time", null)
  .single();

  if(!log) return;

  const start = new Date(log.start_time).getTime();
  const endDate = new Date();
  const end = new Date().getTime();
  const diff = Math.floor((end - start) / 1000);

  await db.from("task_logs")
  .update({
    end_time:endDate.toISOString(),
    duration:diff
  })
  .eq("id", log.id);

  await db.from("tasks")
  .update({
    status:"pending"
  })
  .eq("id", taskId);

  showToast("Task stopped","success");
  loadMyTasks();
}

async function completeTask(taskId){
  const empId = await getEmployeeId();

  await db.from("task_logs")
  .update({
    end_time:new Date().toISOString()
  })
  .eq("task_id", taskId)
  .eq("employee_id", empId)
  .is("end_time", null);

  await db.from("tasks")
  .update({
    status:"submitted"
  })
  .eq("id", taskId);

  showToast("Task submitted","success");
  loadMyTasks();
}

async function submitExpense(){

  const { data: sessionData } = await db.auth.getSession();

  if (!sessionData.session) {
    hideLoader();
    showToast("Session expired, login again","error");
    return;
  }

  const empId = await getEmployeeId();

  const amount = document.getElementById("expAmount").value;
  const category = document.getElementById("expCategory").value;
  const desc = document.getElementById("expDesc").value;

  const file = document.getElementById("expReceipt").files[0];

  let receiptUrl = null;
  
  if(!amount){
    showToast("Enter amount","error");
    return;
  }

  if(!category){
    showToast("Select category","error");
    return;
  }

  if(!desc){
    showToast("Enter description","error");
    return;
  }

  showLoader("Submitting expense...");

  // 🔥 upload file
  if(file){
     // 🔴 size check (1MB)
    if(file.size > 1024 * 1024){
      hideLoader();
      showToast("File must be less than 1MB","error");
      return;
    }

    // only images/pdf allow
    const allowedTypes = ["image/jpeg","image/png","application/pdf"];

    if(!allowedTypes.includes(file.type)){
      hideLoader();
      showToast("Only JPG, PNG or PDF allowed","error");
      return;
    }

    const path = `${empId}/${Date.now()}_${file.name}`;

    const { error } = await db.storage
    .from("receipts")
    .upload(path,file);

    if(error){
      hideLoader();
      showToast(error.message,"error");
      return;
    }

    const { data } = db.storage
    .from("receipts")
    .getPublicUrl(path);

    receiptUrl = data.publicUrl;
  }

  // 🔥 insert DB
  const { error } = await db.from("reimbursements").insert({
    employee_id: empId,
    amount: amount,
    category: category,
    description: desc,
    receipt_url: receiptUrl,
    status: "pending"

  });

  if(error){
    hideLoader();
    showToast(error.message,"error");
    return;
  }

  hideLoader();
  showToast("Expense submitted","success");

  loadExpenses();
}

async function loadLeaveBalance(){

const empId = await getEmployeeId();

const { data: types } = await db
.from("leave_types")
.select("*");

const currentYear = new Date().getFullYear();

const { data: approvedLeaves } = await db
.from("leave_requests")
.select("type_id, days, start_date")
.eq("status","approved")
.eq("employee_id", empId)
.order("created_at",{ascending:false});

const usedMap = {};

approvedLeaves.forEach(l=>{
const year = new Date(l.start_date).getFullYear();
if(year === currentYear){
if(!usedMap[l.type_id]) usedMap[l.type_id] = 0;
usedMap[l.type_id] += l.days;
}
});

const container = document.getElementById("balanceCards");
container.innerHTML = "";

types.forEach(t=>{

const used = usedMap[t.id] || 0;
const remaining = t.yearly_quota - used;

/* status decide */
let statusClass = "balance-good";

if(remaining < (t.yearly_quota * 0.25)) statusClass = "balance-warning";
if(remaining <= 0) statusClass = "balance-danger";
if(remaining < 0) statusClass = "balance-negative";

container.innerHTML += `

<div class="balance-card ${statusClass}">
  <div class="balance-title">${t.name}</div>

  <div class="balance-values">
    Total: ${t.yearly_quota}<br>
    Used: ${used}
  </div>

async function detectLeaveConflict(start,end){

const empId = await getEmployeeId();

const { data:leaves } = await db
.from("leave_requests")
.select("start_date,end_date,status")
.eq("employee_id", empId)
.in("status",["approved","pending"]);

if(!leaves) return null;

const startDate = new Date(start);
const endDate = new Date(end);

for(const l of leaves){

const leaveStart = new Date(l.start_date);
const leaveEnd = new Date(l.end_date);

const overlap =
startDate <= leaveEnd && endDate >= leaveStart;

if(overlap){

if(l.status === "approved"){
return "⚠ Conflict with approved leave (" + l.start_date + " → " + l.end_date + ")";
}

if(l.status === "pending"){
return "⚠ Conflict with pending request (" + l.start_date + " → " + l.end_date + ")";
}

}

}

return null;

}

async function calculatePreview(){

const startInput = document.getElementById("startDate");
const endInput = document.getElementById("endDate");
const halfInput = document.getElementById("isHalfDay");

const preview = document.getElementById("leaveDaysPreview");
const holidayBox = document.getElementById("holidayNotice");

if(!startInput.value || !endInput.value){
preview.innerText="";
holidayBox.innerText="";
return;
}

let startDate = new Date(startInput.value);
let endDate = new Date(endInput.value);

let totalDays = 0;
let holidayCount = 0;

while(startDate <= endDate){

const day = startDate.getDay();

const date =
startDate.getFullYear() + "-" +
String(startDate.getMonth()+1).padStart(2,"0") + "-" +
String(startDate.getDate()).padStart(2,"0");

/* Sunday skip */
if(day !== 0){

/* Check holiday from DB */
const isHoliday = holidays.some(h => h.holiday_date === date);

if(isHoliday){
holidayCount++;
}
else{
totalDays++;
}

}

startDate.setDate(startDate.getDate()+1);

}

/* Half day logic */
if(halfInput.checked){
totalDays = totalDays * 0.5;
}

preview.innerText = "Total Leave Days: " + totalDays;

if(holidayCount > 0){
holidayBox.innerText = holidayCount + " holiday excluded from leave calculation";
}else{
holidayBox.innerText="";
}

const conflictBox = document.getElementById("leaveConflict");

const conflict = await detectLeaveConflict(startInput.value,endInput.value);

if(conflict){
conflictBox.innerText = conflict;
}else{
conflictBox.innerText = "";
}

}
