async function generatePayslip(payroll){
  showLoader("Generating payslip...");
  const { jsPDF } = window.jspdf

  /* FETCH EMPLOYEE */
  const { data: emp } = await db
  .from("employees")
  .select("name,email,job_title,department")
  .eq("auth_user_id", payroll.employee_id)
  .single()

  const doc = new jsPDF()
  const left = 15
  let y = 20

  /* LOGO */
  const img = new Image()
  img.src = "Revaya_Logo_Transparent.png"

  await new Promise(resolve => {
    img.onload = resolve
  })

  doc.addImage(img, "PNG", 150, 10, 40, 15)

  /* HEADER */
  doc.setFontSize(18)
  doc.text("Salary Slip", left, y)

  y += 8
  doc.setFontSize(10)
  doc.text(`Period: ${payroll.period_start} to ${payroll.period_end}`, left, y)

  y += 10

  /* EMPLOYEE INFO */
  doc.setFontSize(12)
  doc.text("Employee Details", left, y)

  y += 6
  doc.setFontSize(10)

  doc.text(`Name: ${emp?.name || "-"}`, left, y)
  y += 5
  doc.text(`Designation: ${emp?.job_title || "-"}`, left, y)
  y += 5
  doc.text(`Department: ${emp?.department || "-"}`, left, y)

  y += 10

  /* ========================= */
  /* EARNINGS TABLE */
  /* ========================= */

  doc.setFontSize(12)
  doc.text("Earnings", left, y)

  y += 6

  const earnings = [
  ["Basic Salary", payroll.basic_salary],
  ["Home Allowance", payroll.home_allowance],
  ["Travel Allowance", payroll.travel_allowance],
  ["Mobile Allowance", payroll.mobile_allowance],
  ["Commission", payroll.commission]
  ]

  earnings.forEach(row=>{
  doc.rect(left, y, 120, 8)
  doc.rect(left + 120, y, 60, 8)

  doc.text(row[0], left + 2, y + 5)
  doc.text(`Rs ${Number(row[1]).toLocaleString()}`, left + 122, y + 5)

  y += 8
  })

  y += 8

  /* ========================= */
  /* DEDUCTIONS TABLE */
  /* ========================= */

  doc.setFontSize(12)
  doc.text("Deductions", left, y)

  y += 6

  const deductions = [
  ["Leave Deduction", payroll.deduction],
  ["Tax", payroll.tax_amount]
  ]

  deductions.forEach(row=>{
  doc.rect(left, y, 120, 8)
  doc.rect(left + 120, y, 60, 8)

  doc.text(row[0], left + 2, y + 5)
  doc.text(`Rs ${Number(row[1]).toLocaleString()}`, left + 122, y + 5)

  y += 8
  })

  y += 10

  /* ========================= */
  /* SUMMARY BOX */
  /* ========================= */

  doc.setDrawColor(0)
  doc.rect(left, y, 180, 25)

  doc.setFontSize(12)

  y += 8
  doc.text(`Gross Salary: Rs ${Number(payroll.gross_salary).toLocaleString()}`, left + 5, y)

  y += 7
  doc.text(`Net Salary: Rs ${Number(payroll.net_salary).toLocaleString()}`, left + 5, y)

  y += 12

  /* FOOTER */
  doc.setFontSize(9)
  doc.text("This is a system generated payslip", left, y)

  doc.save(`Payslip_${payroll.period_start}.pdf`)
  hideLoader();
  }

async function applyLeave() {
  showLoader("Submitting leave...");
  const { data: userData } = await db.auth.getUser();
  const ptoValue = document.querySelector('input[name="ptoType"]:checked').value === "true";
  const isHalf = document.getElementById("isHalfDay").checked;
  const session = isHalf ? document.getElementById("halfDaySession").value : null;
  const { data, error } = await db.from("leave_requests").insert({
  employee_id: userData.user.id,
  type_id: leaveType.value,
  is_half_day: isHalf,
  half_day_session: session,
  start_date: startDate.value,
  end_date: endDate.value,
  is_pto: ptoValue
  })
  .select()
  .single();
  if(error){
  hideLoader();
  showToast(error.message,"error");
  return;
  }

  const { data: sessionData } = await db.auth.getSession();

  if (!sessionData.session) {
    console.error("❌ No session found");
    hideLoader();
    showToast("Session expired. Please login again","error");
    return;
  }

  const headers = {
    "Content-Type": "application/json",
    "Authorization": "Bearer " + sessionData.session.access_token,
    "apikey": SUPABASE_ANON_KEY
  };

  await fetch("https://shecktyeqaqojhotysff.supabase.co/functions/v1/notify-leave-request", {
    method: "POST",
    headers: headers,
    body: JSON.stringify({
      leave_request_id: data?.id || data?.[0]?.id
    })
  });

  const { data: emp } = await db
  .from("employees")
  .select("name,phone,email")
  .eq("auth_user_id", userData.user.id)
  .single();

  const leaveDays = (document.getElementById("leaveDaysPreview").innerText || "")
  .replace("Total Leave Days: ","")
  .trim();

  hideLoader();
  showToast("Leave request submitted","success");
  loadRequests();
}

async function loadRequests(){

const selectedStatus = document.getElementById("empStatusFilter").value;
const fromDate = document.getElementById("empFromDate").value;
const toDate = document.getElementById("empToDate").value;
const selectedType = document.getElementById("empTypeFilter").value;
const ptoFilter = document.getElementById("empPtoFilter").value;

let query = db
.from("leave_requests")
.select("*")
.order("created_at",{ascending:false});

if(selectedStatus !== "all"){
query = query.eq("status",selectedStatus);
}

if(fromDate){
query = query.gte("start_date",fromDate);
}

if(toDate){
query = query.lte("end_date",toDate);
}

if(selectedType !== "all"){
query = query.eq("type_id",selectedType);
}

if(ptoFilter === "paid"){
query = query.eq("is_pto",true);
}

if(ptoFilter === "unpaid"){
query = query.eq("is_pto",false);
}

const { data } = await query;


const { data: types } = await db
.from("leave_types")
.select("id,name");
const typeMap = {};
types.forEach(t => typeMap[t.id] = t.name);
const body = document.querySelector("#leaveTable tbody");
body.innerHTML="";
data.forEach(r=>{body.innerHTML+=`
                <tr>
                  <td>${typeMap[r.type_id]}</td>
                  <td>${r.start_date}</td>
                  <td>${r.end_date}</td>
                  <td>${r.days}</td>
                  <td>${r.is_half_day? `Half Day (${r.half_day_session})`: `${r.days} Day(s)`}</td>
                  <td>
                    <span class="center badge ${r.status === "approved" ? "badge-good": r.status === "pending" ? "badge-pending": r.status === "cancel_requested" ? "badge-pending": "badge-bad"}">
                      ${r.status.charAt(0).toUpperCase() + r.status.slice(1)}
                    </span>
                  </td>
                  <td>
                    <span class="center badge ${r.is_pto ? 'badge-good' : 'badge-bad'}">
                      ${r.is_pto ? "Paid" : "Unpaid"}
                    </span>
                  </td>
                  <td>${r.admin_comment || "-"}</td>
                  <td class="center">${r.status === "pending"? `<button onclick="cancelLeave('${r.id}')">Cancel</button>`: ""}</td>
                </tr>`;
});
}

async function loadLeaveBalance(){

const { data: userData } = await db.auth.getUser();
const userId = userData.user.id;

const { data: types } = await db
.from("leave_types")
.select("*");

const currentYear = new Date().getFullYear();

const { data: approvedLeaves } = await db
.from("leave_requests")
.select("type_id, days, start_date")
.eq("status","approved");

const usedMap = {};

approvedLeaves.forEach(l=>{
const year = new Date(l.start_date).getFullYear();
if(year === currentYear){
if(!usedMap[l.type_id]) usedMap[l.type_id] = 0;
usedMap[l.type_id] += l.days;
}
});

const container = document.getElementById("balanceCards");
container.innerHTML = "";

types.forEach(t=>{

const used = usedMap[t.id] || 0;
const remaining = t.yearly_quota - used;

/* status decide */
let statusClass = "balance-good";

if(remaining < (t.yearly_quota * 0.25)) statusClass = "balance-warning";
if(remaining <= 0) statusClass = "balance-danger";
if(remaining < 0) statusClass = "balance-negative";

container.innerHTML += `

<div class="balance-card ${statusClass}">
  <div class="balance-title">${t.name}</div>

  <div class="balance-values">
    Total: ${t.yearly_quota}<br>
    Used: ${used}
  </div>

  <div class="balance-remaining">
    Remaining: ${remaining}
  </div>
</div>
`;
});
}

async function cancelLeave(id){
  showLoader("Cancelling leave...");
  const { error } = await db.from("leave_requests")
  .update({ status:"cancelled" })
  .eq("id",id);

  if(error){
    hideLoader();
    showToast(error.message,"error");
    return;
  }

  /* 🔥 GOOGLE SHEET UPDATE */
  try{
    await fetch(GOOGLE_SHEET_WEBHOOK_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body: new URLSearchParams({
      leave_id: id,
      status: "cancelled"
    })
  });

  }catch(e){
    hideLoader();
    console.error("Sheet update failed", e);
  }
    hideLoader();
    showToast("Leave request cancelled","success");
    loadRequests();
    loadLeaveBalance();
}

async function detectLeaveConflict(start,end){

const { data:userData } = await db.auth.getUser();

const { data:leaves } = await db
.from("leave_requests")
.select("start_date,end_date,status")
.eq("employee_id",userData.user.id)
.in("status",["approved","pending"]);

if(!leaves) return null;

const startDate = new Date(start);
const endDate = new Date(end);

for(const l of leaves){

const leaveStart = new Date(l.start_date);
const leaveEnd = new Date(l.end_date);

const overlap =
startDate <= leaveEnd && endDate >= leaveStart;

if(overlap){

if(l.status === "approved"){
return "⚠ Conflict with approved leave (" + l.start_date + " → " + l.end_date + ")";
}

if(l.status === "pending"){
return "⚠ Conflict with pending request (" + l.start_date + " → " + l.end_date + ")";
}

}

}

return null;

}

async function calculatePreview(){

const startInput = document.getElementById("startDate");
const endInput = document.getElementById("endDate");
const halfInput = document.getElementById("isHalfDay");

const preview = document.getElementById("leaveDaysPreview");
const holidayBox = document.getElementById("holidayNotice");

if(!startInput.value || !endInput.value){
preview.innerText="";
holidayBox.innerText="";
return;
}

let startDate = new Date(startInput.value);
let endDate = new Date(endInput.value);

let totalDays = 0;
let holidayCount = 0;

while(startDate <= endDate){

const day = startDate.getDay();

const date =
startDate.getFullYear() + "-" +
String(startDate.getMonth()+1).padStart(2,"0") + "-" +
String(startDate.getDate()).padStart(2,"0");

/* Sunday skip */
if(day !== 0){

/* Check holiday from DB */
const isHoliday = holidays.some(h => h.holiday_date === date);

if(isHoliday){
holidayCount++;
}
else{
totalDays++;
}

}

startDate.setDate(startDate.getDate()+1);

}

/* Half day logic */
if(halfInput.checked){
totalDays = totalDays * 0.5;
}

preview.innerText = "Total Leave Days: " + totalDays;

if(holidayCount > 0){
holidayBox.innerText = holidayCount + " holiday excluded from leave calculation";
}else{
holidayBox.innerText="";
}

const conflictBox = document.getElementById("leaveConflict");

const conflict = await detectLeaveConflict(startInput.value,endInput.value);

if(conflict){
conflictBox.innerText = conflict;
}else{
conflictBox.innerText = "";
}

}

async function loadHolidays(){

const { data } = await db
.from("holidays")

holidays = data;

holidayDates = data.map(h => h.holiday_date);

}

function initCalendar(){

flatpickr("#startDate",{

dateFormat:"Y-m-d",

disable:[
function(date){
return date.getDay() === 0;
}
],

onDayCreate:function(dObj,dStr,fp,dayElem){

const d = dayElem.dateObj;

const date =
d.getFullYear() + "-" +
String(d.getMonth()+1).padStart(2,"0") + "-" +
String(d.getDate()).padStart(2,"0");

const holiday = holidays.find(h => h.holiday_date === date);

if(holiday){

dayElem.style.background="#fee2e2";
dayElem.style.color="#b91c1c";

dayElem.title = holiday.name;

}

}

});

flatpickr("#endDate",{

dateFormat:"Y-m-d",

disable:[
function(date){
return date.getDay() === 0;
}
],

onDayCreate:function(dObj,dStr,fp,dayElem){

const d = dayElem.dateObj;

const date =
d.getFullYear() + "-" +
String(d.getMonth()+1).padStart(2,"0") + "-" +
String(d.getDate()).padStart(2,"0");

const holiday = holidays.find(h => h.holiday_date === date);

if(holiday){

dayElem.style.background="#fee2e2";
dayElem.style.color="#b91c1c";

dayElem.title = holiday.name;

}

}

});

}
